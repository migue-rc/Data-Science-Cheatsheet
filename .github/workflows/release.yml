name: Release PDF

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v2
        with:
          root_file: Data_Science_Cheatsheet.tex
          args: "-pdf -outdir=docs"

      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          files: docs/Data_Science_Cheatsheet.pdf
          fail_on_unmatched_files: true